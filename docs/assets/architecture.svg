<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#F7F8FB"/>
  <rect x="56" y="48" width="1168" height="132" rx="8" fill="#0F172A"/>
  <text x="88" y="92" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">RogueLLM</text>
  <text x="88" y="142" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Automated OWASP LLM Top 10 red-team pipeline for a cybersecurity RAG target</text>
  <text x="88" y="170" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">Attacks -&gt; execution -&gt; scoring -&gt; guardrails -&gt; offline risk report -&gt; CI smoke checks</text>

  <rect x="72" y="236" width="212" height="144" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="96" y="276" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Attack dataset</text>
  <text x="96" y="312" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">175 attacks</text>
  <text x="96" y="344" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">OWASP LLM01-LLM10</text>
  <text x="96" y="372" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Synthetic, versioned, stratified</text>

  <rect x="356" y="236" width="212" height="144" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="380" y="276" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">AttackRunner</text>
  <text x="380" y="312" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Async execution</text>
  <text x="380" y="344" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Rate limiting, retries, cache</text>
  <text x="380" y="372" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Results + guardrail decisions</text>

  <rect x="640" y="236" width="212" height="144" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="664" y="276" fill="#D97706" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">GuardrailTarget</text>
  <text x="664" y="312" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">3 layers</text>
  <text x="664" y="344" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">L1 sanitizer</text>
  <text x="664" y="372" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">L2 classifier - L3 output filter</text>

  <rect x="924" y="236" width="280" height="144" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="948" y="276" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">RAG chatbot</text>
  <text x="948" y="312" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">llama-3.1-8b-instant</text>
  <text x="948" y="344" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">LangChain + FAISS + MiniLM</text>
  <text x="948" y="372" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Cybersecurity knowledge base</text>

  <rect x="72" y="464" width="320" height="172" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="96" y="504" fill="#DC2626" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Evaluation engine</text>
  <text x="96" y="540" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">6 metrics + cache</text>
  <text x="96" y="572" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Faithfulness, hallucination, injection, refusal,</text>
  <text x="96" y="600" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">PII leakage, system prompt leak</text>

  <rect x="448" y="464" width="320" height="172" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="472" y="504" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Reporting</text>
  <text x="472" y="540" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">risk_report.json + HTML</text>
  <text x="472" y="572" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Plotly heatmaps, layer attribution,</text>
  <text x="472" y="600" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">residual analysis, methodology, limitations</text>

  <rect x="824" y="464" width="380" height="172" rx="8" fill="#FFFFFF" stroke="#D9E0EA"/>
  <text x="848" y="504" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">CI/CD</text>
  <text x="848" y="540" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">GitHub Actions</text>
  <text x="848" y="572" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Lint, typecheck, coverage gate, PR safety smoke check</text>
  <text x="848" y="600" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Manual full 175-attack runs feed baseline updates</text>

